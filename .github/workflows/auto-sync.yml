name: Auto Sync to Deal Acres Repositories

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Sync to ParcharManch Repositories
        run: |
          git remote remove mirror || true
          git remote add mirror https://x-access-token:${{ secrets.PARCHARMANCH_TOKEN  }}@github.com/officialpracharmanch/parcharmanch_redesign.git
          git push mirror HEAD:main --force

      